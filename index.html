<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Horaires de prière</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Arial', sans-serif;
  background: #f9f5f0;
  color: #2c3e50;
  text-align:center;
  padding: 30px 10px;
  margin:0;
}

.container{
  max-width: 400px;
  margin:auto;
  background:white;
  padding: 25px 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1{
  font-family: 'Amiri', serif;
  font-size: 32px;
  margin-bottom:20px;
  color:#2c3e50;
}

input[type="text"]{
  width: 80%;
  padding:10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size:16px;
}

button{
  padding:10px 15px;
  margin-left:5px;
  border:none;
  border-radius:10px;
  background:#2c3e50;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#34495e;
}

#suggestions{
  background:white;
  border:1px solid #ccc;
  max-width:300px;
  margin:auto;
  text-align:left;
  border-radius:10px;
  overflow:hidden;
}

.suggestion{
  padding:8px;
  cursor:pointer;
}

.suggestion:hover{
  background:#f0f0f0;
}

.card{
  background:#fff5e6;
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
}

.card span{
  font-weight:bold;
  color:#e74c3c;
}

#nextPrayer{
  margin-top:15px;
  font-size:16px;
  font-weight:bold;
  color:#e74c3c;
}

table{
  margin-top:20px;
  width:100%;
  border-collapse: collapse;
  border-radius: 10px;
  overflow:hidden;
}

table th, table td{
  border:1px solid #ccc;
  padding:6px;
  font-size:14px;
}

table th{
  background:#ecf0f1;
}

table tr:nth-child(even){
  background:#fdf6f0;
}
</style>
</head>

<body>

<div class="container">

<h1>Horaires d'Adhan</h1>

<!-- Barre de recherche avec auto-complétion -->
<input type="text" id="city" placeholder="Entrez une ville">
<div id="suggestions"></div>
<button onclick="getPrayerTimes()">Afficher</button>

<!-- Cartes horaires -->
<div id="prayers"></div>

<!-- Compteur -->
<h2 id="nextPrayer"></h2>

<!-- Tableau comparatif -->
<h2>Horaires selon différentes méthodes</h2>
<table id="comparison">
<tr>
<th>Méthode</th>
<th>Fajr</th>
<th>Dhuhr</th>
<th>Asr</th>
<th>Maghrib</th>
<th>Isha</th>
</tr>
</table>

</div>

<script>
// Récupérer les horaires selon différentes méthodes
async function getPrayerTimes(){

    let city = document.getElementById("city").value || "Paris";
    let country = "France";

    let methods = [
        {id:2, name:"ISNA"},
        {id:3, name:"MWL"},
        {id:4, name:"Umm al-Qura"},
        {id:5, name:"Egypt"},
        {id:7, name:"Tehran"},
        {id:12, name:"UOIF"}
    ];

    let mainTimings = null;
    let tableHTML = "";

    for(let m of methods){
        let url = `https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=${m.id}`;
        let response = await fetch(url);
        let data = await response.json();
        let timings = data.data.timings;

        if(!mainTimings) mainTimings = timings;

        tableHTML += `<tr>
            <td>${m.name}</td>
            <td>${timings.Fajr}</td>
            <td>${timings.Dhuhr}</td>
            <td>${timings.Asr}</td>
            <td>${timings.Maghrib}</td>
            <td>${timings.Isha}</td>
        </tr>`;
    }

    // Afficher tableau comparatif
    document.getElementById("comparison").innerHTML = `<tr>
        <th>Méthode</th><th>Fajr</th><th>Dhuhr</th><th>Asr</th><th>Maghrib</th><th>Isha</th>
    </tr>` + tableHTML;

    // Afficher horaires principales sous forme de cartes
    document.getElementById("prayers").innerHTML = `
        <div class="card"><span>Fajr</span> : ${mainTimings.Fajr}</div>
        <div class="card"><span>Dhuhr</span> : ${mainTimings.Dhuhr}</div>
        <div class="card"><span>Asr</span> : ${mainTimings.Asr}</div>
        <div class="card"><span>Maghrib</span> : ${mainTimings.Maghrib}</div>
        <div class="card"><span>Isha</span> : ${mainTimings.Isha}</div>
    `;

    startCountdown(mainTimings);
}

// Compteur prochaine prière
function startCountdown(timings){
    let prayers = [
        ["Fajr", timings.Fajr],
        ["Dhuhr", timings.Dhuhr],
        ["Asr", timings.Asr],
        ["Maghrib", timings.Maghrib],
        ["Isha", timings.Isha]
    ];

    setInterval(()=>{
        let now = new Date();

        for(let i=0;i<prayers.length;i++){
            let [name,time] = prayers[i];
            let prayerTime = new Date();
            let parts = time.split(":");
            prayerTime.setHours(parts[0]);
            prayerTime.setMinutes(parts[1]);
            prayerTime.setSeconds(0);

            if(prayerTime > now){
                let diff = prayerTime - now;
                let hours = Math.floor(diff/1000/60/60);
                let minutes = Math.floor(diff/1000/60)%60;
                let seconds = Math.floor(diff/1000)%60;

                document.getElementById("nextPrayer").innerHTML =
                `Prochaine prière : ${name} dans ${hours}h ${minutes}m ${seconds}s`;
                break;
            }
        }
    },1000);
}

// Auto-complétion mondiale
document.getElementById("city").addEventListener("input", async function(){
    let query = this.value;
    if(query.length < 1){
        document.getElementById("suggestions").innerHTML = "";
        return;
    }

    let url = `https://nominatim.openstreetmap.org/search?city=${query}&format=json&limit=5`;
    let response = await fetch(url);
    let data = await response.json();

    let suggestions = "";
    data.forEach(place => {
        suggestions += `<div class="suggestion" onclick="selectCity('${place.display_name}')">${place.display_name}</div>`;
    });

    document.getElementById("suggestions").innerHTML = suggestions;
});

// Sélection ville
function selectCity(name){
    document.getElementById("city").value = name;
    document.getElementById("suggestions").innerHTML = "";
}

// Lancer la récupération dès le chargement
getPrayerTimes();

</script>

</body>
</html>
