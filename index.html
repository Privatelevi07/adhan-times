<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Horaires de prière</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Arial', sans-serif;
  background: #f9f5f0;
  color: #2c3e50;
  text-align:center;
  padding: 30px 10px;
  margin:0;
  transition: background 0.5s, color 0.5s;
}

body.dark{
  background: #2c3e50;
  color: #f9f5f0;
}

.container{
  max-width: 400px;
  margin:auto;
  background:white;
  padding: 25px 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: background 0.5s, color 0.5s;
}

body.dark .container{
  background: #34495e;
  color:#f9f5f0;
}

h1{
  font-family: 'Amiri', serif;
  font-size: 32px;
  margin-bottom:20px;
  color:#2c3e50;
}

body.dark h1{
  color:#f9f5f0;
}

input[type="text"]{
  width: 80%;
  padding:10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size:16px;
}

body.dark input[type="text"]{
  background:#f9f5f0;
  color:#2c3e50;
}

button{
  padding:10px 15px;
  margin-left:5px;
  border:none;
  border-radius:10px;
  background:#2c3e50;
  color:white;
  cursor:pointer;
  font-size:16px;
}

body.dark button{
  background:#e74c3c;
}

button:hover{
  background:#34495e;
}

body.dark button:hover{
  background:#c0392b;
}

#suggestions{
  background:white;
  border:1px solid #ccc;
  max-width:300px;
  margin:auto;
  text-align:left;
  border-radius:10px;
  overflow:hidden;
  position:absolute;
  z-index:100;
}

body.dark #suggestions{
  background:#34495e;
  color:#f9f5f0;
  border-color:#e74c3c;
}

.suggestion{
  padding:8px;
  cursor:pointer;
}

.suggestion:hover{
  background:#f0f0f0;
}

body.dark .suggestion:hover{
  background:#2c3e50;
}

.card{
  background:#fff5e6;
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
  transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.5s, color 0.5s;
}

body.dark .card{
  background:#3c5a72;
  color:#f9f5f0;
}

.card span{
  font-weight:bold;
  color:#e74c3c;
}

.pulse{
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 5px rgba(231,76,60,0.3); }
  50% { transform: scale(1.05); box-shadow: 0 0 15px rgba(231,76,60,0.6); }
  100% { transform: scale(1); box-shadow: 0 0 5px rgba(231,76,60,0.3); }
}

#nextPrayer{
  margin-top:15px;
  font-size:16px;
  font-weight:bold;
  color:#e74c3c;
}

body.dark #nextPrayer{
  color:#f9f5f0;
}

table{
  margin-top:20px;
  width:100%;
  border-collapse: collapse;
  border-radius: 10px;
  overflow:hidden;
}

table th, table td{
  border:1px solid #ccc;
  padding:6px;
  font-size:14px;
}

table th{
  background:#ecf0f1;
}

table tr:nth-child(even){
  background:#fdf6f0;
}

body.dark table th{
  background:#2c3e50;
  color:#f9f5f0;
}

body.dark table tr:nth-child(even){
  background:#3c5a72;
  color:#f9f5f0;
}
</style>
</head>

<body>
<div class="container">

<h1>Horaires d'Adhan</h1>

<input type="text" id="city" placeholder="Entrez une ville">
<div id="suggestions"></div>
<button onclick="getPrayerTimes()">Afficher</button>

<div id="prayers"></div>

<h2 id="nextPrayer"></h2>

<h2>Horaires selon différentes méthodes</h2>
<table id="comparison">
<tr>
<th>Méthode</th>
<th>Fajr</th>
<th>Dhuhr</th>
<th>Asr</th>
<th>Maghrib</th>
<th>Isha</th>
</tr>
</table>

</div>

<script>
// MODE SOMBRE AUTOMATIQUE
function setDarkMode(){
    let hour = new Date().getHours();
    if(hour >=18 || hour <6){
        document.body.classList.add("dark");
    }else{
        document.body.classList.remove("dark");
    }
}
setDarkMode();

// Récupération horaires
async function getPrayerTimes(){
    let cityInput = document.getElementById("city").value || "Paris";
    let cityParts = cityInput.split(",");
    let city = cityParts[0].trim();
    let country = cityParts[1] ? cityParts[1].trim() : "France";

    let methods = [
        {id:2, name:"ISNA"},
        {id:3, name:"MWL"},
        {id:4, name:"Umm al-Qura"},
        {id:5, name:"Egypt"},
        {id:7, name:"Tehran"},
        {id:12, name:"UOIF"}
    ];

    let mainTimings = null;
    let tableHTML = "";

    for(let m of methods){
        let url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=${encodeURIComponent(country)}&method=${m.id}`;
        let response = await fetch(url);
        let data = await response.json();
        let timings = data.data.timings;

        if(!mainTimings) mainTimings = timings;

        tableHTML += `<tr>
            <td>${m.name}</td>
            <td>${timings.Fajr}</td>
            <td>${timings.Dhuhr}</td>
            <td>${timings.Asr}</td>
            <td>${timings.Maghrib}</td>
            <td>${timings.Isha}</td>
        </tr>`;
    }

    document.getElementById("comparison").innerHTML = `<tr>
        <th>Méthode</th><th>Fajr</th><th>Dhuhr</th><th>Asr</th><th>Maghrib</th><th>Isha</th>
    </tr>` + tableHTML;

    // Horaires cartes avec icônes
    document.getElementById("prayers").innerHTML = `
        <div class="card" id="card-Fajr">🕌 <span>Fajr</span> : ${mainTimings.Fajr}</div>
        <div class="card" id="card-Dhuhr">🕌 <span>Dhuhr</span> : ${mainTimings.Dhuhr}</div>
        <div class="card" id="card-Asr">🕌 <span>Asr</span> : ${mainTimings.Asr}</div>
        <div class="card" id="card-Maghrib">🕌 <span>Maghrib</span> : ${mainTimings.Maghrib}</div>
        <div class="card" id="card-Isha">🕌 <span>Isha</span> : ${mainTimings.Isha}</div>
    `;

    startCountdown(mainTimings);
}

// Compteur prochaine prière + animation
function startCountdown(timings){
    let prayers = [
        ["Fajr", timings.Fajr],
        ["Dhuhr", timings.Dhuhr],
        ["Asr", timings.Asr],
        ["Maghrib", timings.Maghrib],
        ["Isha", timings.Isha]
    ];

    setInterval(()=>{
        let now = new Date();
        let nextPrayerName = null;

        prayers.forEach(p=>{
            document.getElementById(`card-${p[0]}`).classList.remove("pulse");
        });

        for(let i=0;i<prayers.length;i++){
            let [name,time] = prayers[i];
            let [h,m] = time.split(":").map(Number);
            let prayerTime = new Date();
            prayerTime.setHours(h);
            prayerTime.setMinutes(m);
            prayerTime.setSeconds(0);

            if(prayerTime > now){
                let diff = prayerTime - now;
                let hours = Math.floor(diff/1000/60/60);
                let minutes = Math.floor(diff/1000/60)%60;
                let seconds = Math.floor(diff/1000)%60;

                document.getElementById("nextPrayer").innerHTML =
                `Prochaine prière : ${name} dans ${hours}h ${minutes}m ${seconds}s`;

                nextPrayerName = name;
                break;
            }
        }

        if(nextPrayerName){
            let card = document.getElementById(`card-${nextPrayerName}`);
            if(card) card.classList.add("pulse");
        }

    },1000);
}

// Auto-complétion Ville, Pays, priorise capitales/connues
document.getElementById("city").addEventListener("input", async function(){
    let query = this.value.trim();
    if(query.length < 1){
        document.getElementById("suggestions").innerHTML = "";
        return;
    }

    let url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=8`;
    let response = await fetch(url);
    let data = await response.json();

    // Trier pour privilégier capitales ou grandes villes
    data.sort((a,b)=>{
        let importanceA = a.importance || 0;
        let importanceB = b.importance || 0;
        return importanceB - importanceA;
    });

    let suggestions = "";
    data.forEach(place => {
        let cityName = place.address.city || place.address.town || place.address.village || place.address.hamlet || place.display_name.split(",")[0];
        let countryName = place.address.country || "";
        let display = cityName + ", " + countryName;
        suggestions += `<div class="suggestion" onclick="selectCity('${display}')">${display}</div>`;
    });

    document.getElementById("suggestions").innerHTML = suggestions;
});

function selectCity(name){
    document.getElementById("city").value = name;
    document.getElementById("suggestions").innerHTML = "";
}

// Lancer au chargement
getPrayerTimes();
</script>

</body>
</html>
