<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Horaires d'Adhan Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
<style>
body{font-family:'Arial',sans-serif;background:#f9f5f0;color:#2c3e50;text-align:center;padding:20px;margin:0;transition:0.5s;}
body.dark{background:#2c3e50;color:#f9f5f0;}
.container{max-width:500px;margin:auto;background:white;padding:25px 20px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);transition:0.5s;}
body.dark .container{background:#34495e;color:#f9f5f0;}
h1{font-family:'Amiri',serif;font-size:32px;margin-bottom:20px;}
input[type="text"]{width:70%;padding:8px;border-radius:10px;border:1px solid #ccc;font-size:16px;}
body.dark input[type="text"]{background:#f9f5f0;color:#2c3e50;}
button{padding:6px 10px;margin-left:5px;border:none;border-radius:10px;background:#2c3e50;color:white;cursor:pointer;}
body.dark button{background:#e74c3c;}
button:hover{background:#34495e;}
body.dark button:hover{background:#c0392b;}
#suggestions{background:white;border:1px solid #ccc;max-width:300px;margin:auto;text-align:left;border-radius:10px;overflow:hidden;position:absolute;z-index:100;}
body.dark #suggestions{background:#34495e;color:#f9f5f0;border-color:#e74c3c;}
.suggestion{padding:6px;cursor:pointer;}
.suggestion:hover{background:#f0f0f0;}
body.dark .suggestion:hover{background:#2c3e50;}
.card{background:#fff5e6;padding:10px;margin:5px 0;border-radius:12px;display:flex;justify-content:space-between;align-items:center;font-size:15px;transition:0.3s;}
body.dark .card{background:#3c5a72;color:#f9f5f0;}
.card span{font-weight:bold;color:#e74c3c;}
.pulse{animation:pulse 1.2s infinite;}
@keyframes pulse{0%{transform:scale(1);box-shadow:0 0 5px rgba(231,76,60,0.3);}50%{transform:scale(1.05);box-shadow:0 0 15px rgba(231,76,60,0.6);}100%{transform:scale(1);box-shadow:0 0 5px rgba(231,76,60,0.3);}}
#nextPrayer{margin-top:8px;font-weight:bold;color:#e74c3c;font-size:14px;}
body.dark #nextPrayer{color:#f9f5f0;}
table{margin-top:12px;width:100%;border-collapse: collapse;}
table th, table td{border:1px solid #ccc;padding:4px;font-size:12px;}
table th{background:#ecf0f1;}
table tr:nth-child(even){background:#fdf6f0;}
body.dark table th{background:#2c3e50;color:#f9f5f0;}
body.dark table tr:nth-child(even){background:#3c5a72;color:#f9f5f0;}
.tooltip {position: relative; display:inline-block; cursor:pointer;}
.tooltip .tooltiptext{visibility:hidden;width:200px;background:#2c3e50;color:#f9f5f0;text-align:left;padding:5px;border-radius:6px;position:absolute;z-index:1;top:100%;left:50%;margin-left:-100px;font-size:12px;}
.tooltip:hover .tooltiptext{visibility:visible;}
#qiblaCanvas{margin-top:10px;border-radius:12px;background:#fff5e6;transition: background 0.5s;}
body.dark #qiblaCanvas{background:#3c5a72;}
</style>
</head>
<body>
<div class="container">
<h1>Horaires d'Adhan Pro</h1>

<button onclick="toggleTheme()">Changer thème</button>
<button onclick="setLanguage('fr')">FR</button>
<button onclick="setLanguage('en')">EN</button>
<button onclick="setLanguage('ar')">AR</button>

<br><br>
<input type="text" id="city" placeholder="Entrez une ville">
<div id="suggestions"></div>
<button onclick="getPrayerTimes()">Afficher</button>
<button onclick="detectLocation()">Localiser</button>

<div id="favorites"></div>
<div id="prayers"></div>
<h2 id="nextPrayer"></h2>

<h2>Méthodes de calcul</h2>
<table id="methodTable"></table>

<h2>Calendrier mensuel</h2>
<table id="calendar"><tr><th>Date</th><th>Fajr</th><th>Dhuhr</th><th>Asr</th><th>Maghrib</th><th>Isha</th></tr></table>

<h2>Qibla</h2>
<canvas id="qiblaCanvas" width="200" height="200"></canvas>
</div>

<script>
// === MODE SOMBRE ===
function setDarkMode(){let h=new Date().getHours(); if(h>=18||h<6)document.body.classList.add("dark"); else document.body.classList.remove("dark");}
setDarkMode(); function toggleTheme(){document.body.classList.toggle("dark");}

// === LANGUES ===
let lang="fr"; function setLanguage(l){lang=l;}

// === NOTIFICATIONS ADHAN ===
if("Notification" in window && Notification.permission!=="granted") Notification.requestPermission();
function notifyPrayer(name){if(Notification.permission==="granted") new Notification(`Prochaine prière : ${name}`,{body:`Il est temps pour ${name}`,icon:"mosque_icon.png"}); let adhan=new Audio("adhan.mp3"); adhan.play().catch(e=>console.log("Audio refusé"));}

// === BARRE AUTO-COMPLÉTION ===
document.getElementById("city").addEventListener("input", async function(){
  let q=this.value.trim(); if(q.length<1){document.getElementById("suggestions").innerHTML="";return;}
  let url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=5`;
  let r=await fetch(url); let data=await r.json();
  data.sort((a,b)=>(b.importance||0)-(a.importance||0));
  let s=""; data.forEach(p=>{
    let c=p.address.city||p.address.town||p.address.village||p.address.hamlet||p.display_name.split(",")[0];
    let co=p.address.country||"";
    s+=`<div class="suggestion" onclick="selectCity('${c}, ${co}')">${c}, ${co}</div>`;
  });
  document.getElementById("suggestions").innerHTML=s;
});
function selectCity(name){document.getElementById("city").value=name;document.getElementById("suggestions").innerHTML="";addFavorite(name);}

// === FAVORIS ===
function addFavorite(city){let favs=JSON.parse(localStorage.getItem("favorites")||"[]"); if(!favs.includes(city)){favs.push(city); localStorage.setItem("favorites",JSON.stringify(favs)); renderFavorites();}}
function renderFavorites(){let favs=JSON.parse(localStorage.getItem("favorites")||"[]"); let html="<h3>Villes favorites :</h3>"; favs.forEach(c=> html+=`<div>${c} <button onclick="useFavorite('${c}')">Afficher</button></div>`); document.getElementById("favorites").innerHTML=html;}
function useFavorite(c){document.getElementById("city").value=c; getPrayerTimes();}

// === MÉTHODES DE CALCUL ===
let methods=[{id:2,name:"ISNA",percent:"25%",info:"Utilisée principalement en Amérique du Nord"},
             {id:3,name:"MWL",percent:"30%",info:"Europe & monde"},
             {id:4,name:"Umm al-Qura",percent:"15%",info:"Arabie Saoudite"},
             {id:5,name:"Egypt",percent:"10%",info:"Égypte"},
             {id:7,name:"Tehran",percent:"5%",info:"Iran"},
             {id:12,name:"UOIF",percent:"15%",info:"France & Europe"}];
function renderMethodTable(){let html="<tr><th>Méthode</th><th>% Utilisation</th></tr>"; methods.forEach(m=>html+=`<tr><td class="tooltip">${m.name}<span class="tooltiptext">${m.info}</span></td><td>${m.percent}</td></tr>`); document.getElementById("methodTable").innerHTML=html;}
renderMethodTable();

// === CHRONO COMPACT ===
function startCountdown(t){
  let prayers=[["Fajr",t.Fajr],["Dhuhr",t.Dhuhr],["Asr",t.Asr],["Maghrib",t.Maghrib],["Isha",t.Isha]];
  setInterval(()=>{
    let now=new Date(),next=null; prayers.forEach(p=>document.getElementById(`card-${p[0]}`).classList.remove("pulse"));
    for(let i=0;i<prayers.length;i++){
      let [name,time]=prayers[i]; let [h,m]=time.split(":").map(Number); let pt=new Date(); pt.setHours(h); pt.setMinutes(m); pt.setSeconds(0);
      if(pt>now){let diff=pt-now; let hh=Math.floor(diff/1000/3600); let mm=Math.floor(diff/1000/60)%60;
      document.getElementById("nextPrayer").innerHTML=`Prochaine prière : ${name} ${hh}h ${mm}m`;
      document.getElementById(`card-${name}`).classList.add("pulse"); next=name; break;}
    }
    if(next) notifyPrayer(next);
  },1000);
}

// Les fonctions getPrayerTimes(), renderCalendar(), renderQibla(), detectLocation() reprennent la version complète précédente
</script>
</body>
</html>
